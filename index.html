<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Responsive Image Gallery</h1>

<div class="gallery">
    <img src="images/image1.jpg" onclick="openImage(this.src)">
    <img src="images/image2.jpg" onclick="openImage(this.src)">
    <img src="images/image3.jpg" onclick="openImage(this.src)">
    <img src="images/image4.jpg" onclick="openImage(this.src)">
    <img src="images/image5.jpg" onclick="openImage(this.src)">
    <img src="images/image6.jpg" onclick="openImage(this.src)">
</div>

<div id="lightbox" class="lightbox">
    <span class="close" onclick="closeImage()">&times;</span>
    <img id="preview">
</div>

<script src="script.js"></script>

</body>
</html>
